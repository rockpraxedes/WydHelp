name: Update Ranking

on:
  schedule:
    # Roda a cada 20 min das 12:00 às 01:00 BRT (UTC-3)
    # 12:00–23:59 BRT = 15:00–02:59 UTC
    - cron: "*/20 15-23 * * *"   # 12:00–20:59 BRT
    - cron: "*/20 0-4 * * *"     # 21:00–01:00 BRT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ranking-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ranking and update snapshots
        run: |
          curl -sf "https://rn3xfhamppsetddkod6vwc24lu0lhcek.lambda-url.us-east-1.on.aws/royal-arena" \
            -o public/ranking-new.json
          node scripts/update-ranking.js public/ranking-new.json
          rm -f public/ranking-new.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/ranking.json public/ranking-snapshots.json
          git diff --staged --quiet && echo "Nada mudou, pulando commit." || (
            git commit -m "chore: update ranking data"
            git pull --rebase --autostash origin main
            git push
          )

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --message "chore: update ranking data"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}