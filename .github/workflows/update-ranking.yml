name: Update Ranking

on:
  schedule:
    - cron: "*/10 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ranking data and update history
        run: |
          # Baixa o ranking novo
          curl -s "https://rn3xfhamppsetddkod6vwc24lu0lhcek.lambda-url.us-east-1.on.aws/royal-arena" \
            -o public/ranking-new.json

          node -e "
            const fs = require('fs');

            const newData = JSON.parse(fs.readFileSync('public/ranking-new.json', 'utf8'));
            const oldData = fs.existsSync('public/ranking.json')
              ? JSON.parse(fs.readFileSync('public/ranking.json', 'utf8'))
              : null;

            // Verifica se houve diferença de wins em qualquer liga
            let hasWinDiff = false;
            if (oldData) {
              const allNew = [...(newData.champion || []), ...(newData.aspirant || [])];
              const allOld = [...(oldData.champion || []), ...(oldData.aspirant || [])];
              const oldMap = Object.fromEntries(allOld.map(p => [p.charName, p]));
              for (const p of allNew) {
                const old = oldMap[p.charName];
                if (old && p.wins > old.wins) { hasWinDiff = true; break; }
              }
            }

            // Atualiza ranking.json
            fs.copyFileSync('public/ranking-new.json', 'public/ranking.json');

            if (!hasWinDiff) {
              console.log('Sem diferença de wins, pulando history.');
              process.exit(0);
            }

            // ── Horário da arena ──────────────────────────────────────────────
            // BRT = UTC-3
            const now = new Date();
            const brtHour = (now.getUTCHours() - 3 + 24) % 24;
            const brtMin  = now.getUTCMinutes();
            const brtTotal = brtHour * 60 + brtMin;

            const arenaSlots = [
              { h: 13, m: 0  },
              { h: 19, m: 0  },
              { h: 20, m: 30 },
              { h: 23, m: 0  },
            ];

            // Pega o slot mais próximo no passado (menor diff >= 0).
            // Se nenhum slot já passou hoje, pega o último slot do dia anterior.
            let arenaLabel = '??:??';
            let minPosDiff = Infinity;

            for (const slot of arenaSlots) {
              const slotTotal = slot.h * 60 + slot.m;
              const diff = brtTotal - slotTotal;
              const label = String(slot.h).padStart(2,'0') + ':' + String(slot.m).padStart(2,'0');

              if (diff >= 0 && diff < minPosDiff) {
                minPosDiff = diff;
                arenaLabel = label;
              }
            }

            // Se nenhum slot passou ainda hoje (ex: execução antes das 13h BRT),
            // usa o slot mais recente considerando virada de dia (módulo 1440 min)
            if (arenaLabel === '??:??') {
              let minAbsDiff = Infinity;
              for (const slot of arenaSlots) {
                const slotTotal = slot.h * 60 + slot.m;
                const diff = (brtTotal - slotTotal + 1440) % 1440;
                const label = String(slot.h).padStart(2,'0') + ':' + String(slot.m).padStart(2,'0');
                if (diff < minAbsDiff) {
                  minAbsDiff = diff;
                  arenaLabel = label;
                }
              }
            }

            // ── Processa cada liga ────────────────────────────────────────────
            const leagues = ['champion', 'aspirant'];
            const entries = [];

            for (const leagueType of leagues) {
              const newPlayers = newData[leagueType] || [];
              const oldPlayers = oldData ? (oldData[leagueType] || []) : [];
              const oldMap = Object.fromEntries(oldPlayers.map(p => [p.charName, p]));

              // Vencedores = quem teve wins a mais em relação ao snapshot anterior
              const winners = newPlayers.filter(p => {
                const old = oldMap[p.charName];
                return old && p.wins > old.wins;
              });

              if (winners.length === 0) continue;

              // Maior diferença de kills nesta arena (entre os vencedores)
              const mostKills = winners.reduce((best, p) => {
                const diffNew  = p.kills  - (oldMap[p.charName]?.kills  ?? p.kills);
                const diffBest = best.kills - (oldMap[best.charName]?.kills ?? best.kills);
                return diffNew > diffBest ? p : best;
              });

              // Menor diferença de deaths nesta arena (entre os vencedores)
              const leastDeaths = winners.reduce((best, p) => {
                const diffNew  = p.deaths  - (oldMap[p.charName]?.deaths  ?? p.deaths);
                const diffBest = best.deaths - (oldMap[best.charName]?.deaths ?? best.deaths);
                return diffNew < diffBest ? p : best;
              });

              const killsDiff  = mostKills.kills   - (oldMap[mostKills.charName]?.kills   ?? mostKills.kills);
              const deathsDiff = leastDeaths.deaths - (oldMap[leastDeaths.charName]?.deaths ?? leastDeaths.deaths);

              entries.push({
                timestamp:   now.toISOString(),
                arenaLabel,
                type:        leagueType,
                winners:     winners.map(p => p.charName),
                mostKills:   { name: mostKills.charName,   kills:  killsDiff  },
                leastDeaths: { name: leastDeaths.charName, deaths: deathsDiff },
              });
            }

            if (entries.length === 0) {
              console.log('Nenhum vencedor encontrado.');
              process.exit(0);
            }

            // ── Histórico ─────────────────────────────────────────────────────
            const historyPath = 'public/arena-history.json';
            let history = fs.existsSync(historyPath)
              ? JSON.parse(fs.readFileSync(historyPath, 'utf8'))
              : [];

            history.unshift(...entries);
            const cutoff = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
            history = history.filter(e => e.timestamp >= cutoff);

            fs.writeFileSync(historyPath, JSON.stringify(history, null, 2));
            console.log('History atualizado — ligas: ' + entries.map(e => e.type).join(', ') + ' | arena das ' + arenaLabel);
          "

          rm -f public/ranking-new.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/ranking.json public/arena-history.json
          git diff --staged --quiet || git commit -m "chore: update ranking data"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --message "chore: update ranking data"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
