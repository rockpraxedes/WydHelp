name: Update Ranking

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ranking data and update history
        run: |
          curl -s "https://rn3xfhamppsetddkod6vwc24lu0lhcek.lambda-url.us-east-1.on.aws/royal-arena" \
            -o public/ranking-new.json

          node -e "
            const fs = require('fs');

            const newData = JSON.parse(fs.readFileSync('public/ranking-new.json', 'utf8'));

            // ranking.json = dados frescos pro frontend
            fs.copyFileSync('public/ranking-new.json', 'public/ranking.json');

            // ── Horário da arena (BRT = UTC-3) ────────────────────────────
            const now      = new Date();
            const brtHour  = (now.getUTCHours() - 3 + 24) % 24;
            const brtMin   = now.getUTCMinutes();
            const brtTotal = brtHour * 60 + brtMin;

            const arenaSlots = [
              { h: 13, m: 0  },
              { h: 19, m: 0  },
              { h: 20, m: 30 },
              { h: 23, m: 0  },
            ];

            // Slot mais próximo no passado
            let arenaLabel = '??:??';
            let minPosDiff = Infinity;
            for (const slot of arenaSlots) {
              const slotTotal = slot.h * 60 + slot.m;
              const diff  = brtTotal - slotTotal;
              const label = String(slot.h).padStart(2,'0') + ':' + String(slot.m).padStart(2,'0');
              if (diff >= 0 && diff < minPosDiff) { minPosDiff = diff; arenaLabel = label; }
            }
            // Antes do primeiro slot do dia → pega o último slot (virada)
            if (arenaLabel === '??:??') {
              let minAbsDiff = Infinity;
              for (const slot of arenaSlots) {
                const slotTotal = slot.h * 60 + slot.m;
                const diff  = (brtTotal - slotTotal + 1440) % 1440;
                const label = String(slot.h).padStart(2,'0') + ':' + String(slot.m).padStart(2,'0');
                if (diff < minAbsDiff) { minAbsDiff = diff; arenaLabel = label; }
              }
            }

            // ── Snapshot por arena + liga ─────────────────────────────────
            // Estrutura: { 'champion_19:00': [...players], 'aspirant_19:00': [...], ... }
            const snapshotPath = 'public/ranking-snapshot.json';
            const snapshots = fs.existsSync(snapshotPath)
              ? JSON.parse(fs.readFileSync(snapshotPath, 'utf8'))
              : {};

            // ── Processa cada liga ────────────────────────────────────────
            const leagues = ['champion', 'aspirant'];
            const entries = [];

            for (const leagueType of leagues) {
              const snapKey    = leagueType + '_' + arenaLabel;
              const newPlayers = newData[leagueType] || [];

              // Se não tem snapshot desta arena+liga ainda, inicializa e aguarda
              if (!snapshots[snapKey]) {
                snapshots[snapKey] = newPlayers;
                console.log(snapKey + ': snapshot inicializado, aguardando próxima rodada.');
                continue;
              }

              const snapPlayers = snapshots[snapKey];
              const snapMap     = Object.fromEntries(snapPlayers.map(p => [p.charName, p]));

              const winners = newPlayers.filter(p => {
                const snap = snapMap[p.charName];
                return snap && p.wins > snap.wins;
              });

              if (winners.length === 0) {
                console.log(snapKey + ': sem diff de wins, snapshot congelado.');
                continue;
              }

              // ── Kills: pega o maior diff e todos que empataram ────────
              const killsDiffs = winners.map(p => ({
                name: p.charName,
                diff: p.kills - (snapMap[p.charName]?.kills ?? p.kills),
              }));
              const maxKills     = Math.max(...killsDiffs.map(x => x.diff));
              const mostKillsAll = killsDiffs.filter(x => x.diff === maxKills).map(x => x.name);

              // ── Deaths: pega o menor diff e todos que empataram ───────
              const deathsDiffs    = winners.map(p => ({
                name: p.charName,
                diff: p.deaths - (snapMap[p.charName]?.deaths ?? p.deaths),
              }));
              const minDeaths       = Math.min(...deathsDiffs.map(x => x.diff));
              const leastDeathsAll  = deathsDiffs.filter(x => x.diff === minDeaths).map(x => x.name);

              entries.push({
                timestamp:   now.toISOString(),
                arenaLabel,
                type:        leagueType,
                winners:     winners.map(p => p.charName),
                mostKills:   {
                  name:  mostKillsAll.length === 1 ? mostKillsAll[0] : mostKillsAll,
                  kills: maxKills,
                },
                leastDeaths: {
                  name:   leastDeathsAll.length === 1 ? leastDeathsAll[0] : leastDeathsAll,
                  deaths: minDeaths,
                },
              });

              // Avança snapshot SOMENTE desta arena+liga
              snapshots[snapKey] = newPlayers;
              console.log(snapKey + ': diff detectado, snapshot avançado.');
            }

            // Salva snapshots (todas as chaves, incluindo as não alteradas)
            fs.writeFileSync(snapshotPath, JSON.stringify(snapshots, null, 2));

            if (entries.length === 0) {
              console.log('Nenhuma liga com vencedores nesta rodada.');
              process.exit(0);
            }

            // ── Histórico (3 dias) ────────────────────────────────────────
            const historyPath = 'public/arena-history.json';
            let history = fs.existsSync(historyPath)
              ? JSON.parse(fs.readFileSync(historyPath, 'utf8'))
              : [];

            history.unshift(...entries);
            const cutoff = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();
            history = history.filter(e => e.timestamp >= cutoff);

            fs.writeFileSync(historyPath, JSON.stringify(history, null, 2));
            console.log('History atualizado — ' + entries.map(e => e.type + '@' + e.arenaLabel).join(', '));
          "

          rm -f public/ranking-new.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/ranking.json public/ranking-snapshot.json public/arena-history.json
          git diff --staged --quiet || git commit -m "chore: update ranking data"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --message "chore: update ranking data"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}