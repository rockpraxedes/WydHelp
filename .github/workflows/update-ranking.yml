name: Update Ranking

on:
  schedule:
    - cron: "*/20 15-23 * * *"
    - cron: "*/20 0-4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ranking-update
  cancel-in-progress: false  # ← era true: cancelar no meio causa commits perdidos

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ← necessário para rebase funcionar corretamente

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ranking and update snapshots
        run: |
          curl -sf "https://rn3xfhamppsetddkod6vwc24lu0lhcek.lambda-url.us-east-1.on.aws/royal-arena" \
            -o public/ranking-new.json
          node scripts/update-ranking.js public/ranking-new.json
          rm -f public/ranking-new.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Puxa atualizações remotas ANTES de gerar o commit
          git pull --rebase --autostash origin main

          git add public/ranking.json public/ranking-snapshots.json

          if git diff --staged --quiet; then
            echo "Nada mudou, pulando commit."
          else
            git commit -m "chore: update ranking data"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --message "chore: update ranking data"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}