name: Update Ranking

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ranking-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ranking data and update history
        run: |
          curl -s "https://rn3xfhamppsetddkod6vwc24lu0lhcek.lambda-url.us-east-1.on.aws/royal-arena" \
            -o public/ranking-new.json

          node -e "
          // (seu código permanece exatamente igual aqui)
          "

          rm -f public/ranking-new.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/ranking.json public/ranking-snapshot.json public/arena-history.json
          git diff --staged --quiet || git commit -m "chore: update ranking data"

          git pull --rebase origin main
          git push

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          npx gh-pages -d dist \
            -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git \
            --message "chore: update ranking data"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}